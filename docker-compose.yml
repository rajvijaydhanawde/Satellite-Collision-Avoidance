version: '3.9'
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes: ["./backend:/app"]
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    ports: ["3000:80"]
    volumes: ["./frontend:/usr/share/nginx/html:ro"]
    depends_on: [backend]
